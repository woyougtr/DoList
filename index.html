<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoList - 待办清单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-light: #34d399;
            --primary-dark: #059669;
            --bg: #f0fdf4;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 20%, rgba(16, 185, 129, 0.08) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
            color: var(--text);
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px 90px; }
        h1 { text-align: center; font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 20px; padding: 16px 0; }
        
        /* Auth */
        .auth-container { max-width: 400px; margin: 60px auto; }
        .auth-card { background: var(--card-bg); border-radius: 24px; padding: 32px; box-shadow: var(--shadow); }
        .auth-title { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
        .auth-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #f3f4f6; padding: 4px; border-radius: 14px; }
        .auth-tab { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
        .auth-tab.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .input-wrapper { position: relative; }
        .auth-input { width: 100%; padding: 14px 40px 14px 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; transition: all 0.2s; }
        .auth-input:focus { border-color: var(--primary); background: #f0fdf4; }
        .input-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; font-size: 20px; color: #d1d5db; display: none; padding: 4px; line-height: 1; }
        .input-clear:hover { color: #9ca3af; }
        .input-clear.show { display: block; }
        .auth-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .auth-btn:hover { background: var(--primary-light); }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* App Content */
        #appContent { display: none; }
        #appContent.show { display: block; }
        
        /* Card */
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
        
        /* Add Form */
        .add-form { display: flex; flex-direction: column; gap: 12px; }
        .add-form input[type="text"] { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 14px; font-size: 15px; outline: none; transition: all 0.2s; }
        .add-form input[type="text"]:focus { border-color: var(--primary); background: #f0fdf4; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        /* Custom Select Dropdowns */
        .custom-select { position: relative; }
        .select-btn { 
            display: flex; align-items: center; gap: 6px; 
            padding: 10px 14px; 
            background: #f3f4f6; 
            border: 2px solid transparent; 
            border-radius: 12px; 
            font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            color: var(--text);
            user-select: none;
        }
        .select-btn:hover { background: #e5e7eb; }
        .select-btn .arrow { font-size: 10px; transition: transform 0.2s; }
        .custom-select.open .select-btn { 
            background: var(--primary); color: #fff; 
            border-color: var(--primary);
        }
        .custom-select.open .arrow { transform: rotate(180deg); }
        .select-dropdown {
            position: absolute; top: calc(100% + 6px); left: 0;
            min-width: 140px; background: #fff;
            border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 100; overflow: hidden;
            opacity: 0; transform: translateY(-8px);
            pointer-events: none; transition: all 0.2s;
        }
        .custom-select.open .select-dropdown {
            opacity: 1; transform: translateY(0);
            pointer-events: auto;
        }
        .select-option {
            padding: 12px 16px; cursor: pointer;
            transition: background 0.15s;
            font-size: 14px;
        }
        .select-option:hover { background: #f3f4f6; }
        .select-option.selected { background: #f0fdf4; color: var(--primary); font-weight: 600; }
        
        /* Date Input */
        .date-input { 
            padding: 10px 14px; 
            border: 2px solid #f3f4f6; 
            border-radius: 12px; 
            font-size: 14px; 
            background: #f3f4f6;
            cursor: pointer; outline: none;
            transition: all 0.2s;
            color: var(--text);
        }
        .date-input:focus { border-color: var(--primary); background: #fff; }
        
        /* Add Button */
        .btn { padding: 12px 24px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-light); transform: scale(1.02); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        /* Stats */
        .stats { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: linear-gradient(135deg, #f0fdf4 0%, #d1fae5 100%); border-radius: 14px; margin-bottom: 16px; font-size: 13px; color: var(--text-secondary); }
        .stats strong { color: var(--primary); font-size: 15px; }
        .sync-status { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .sync-status.synced { background: #d1fae5; color: #065f46; }
        .sync-status.syncing { background: #fef3c7; color: #92400e; }
        .sync-status.offline { background: #f3f4f6; color: #6b7280; }
        .sync-status.error { background: #fee2e2; color: #991b1b; }
        
        /* Filters */
        .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .filter-btn { padding: 8px 16px; border: 2px solid var(--border); border-radius: 20px; background: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .filter-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; }
        
        /* Category Tabs */
        .tab-bar { display: flex; gap: 6px; margin-bottom: 16px; background: #f3f4f6; padding: 5px; border-radius: 14px; }
        .tab-btn { flex: 1; padding: 10px 8px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
        .tab-btn.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        /* Todo List */
        .todo-list { list-style: none; }
        .todo-item { display: flex; align-items: flex-start; gap: 12px; padding: 16px; background: var(--card-bg); border-radius: 16px; margin-bottom: 10px; box-shadow: var(--shadow); transition: all 0.2s; }
        .todo-item:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .todo-item.completed { opacity: 0.6; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-secondary); }
        .todo-checkbox { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; margin-top: 1px; background: #fff; }
        .todo-checkbox:hover { border-color: var(--primary); background: #f0fdf4; }
        .todo-item.completed .todo-checkbox { background: var(--primary); border-color: var(--primary); color: #fff; }
        .todo-content { flex: 1; min-width: 0; }
        .todo-text { font-size: 15px; margin-bottom: 8px; word-break: break-word; line-height: 1.5; }
        .todo-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 12px; }
        .tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .tag-work { background: #dbeafe; color: #1d4ed8; }
        .tag-life { background: #fce7f3; color: #be185d; }
        .tag-study { background: #fef3c7; color: #b45309; }
        .tag-urgent { background: #fee2e2; color: #dc2626; }
        .tag-normal { background: #f3f4f6; color: #6b7280; }
        .due-date { padding: 4px 10px; border-radius: 20px; background: #f3f4f6; color: var(--text-secondary); font-size: 11px; font-weight: 500; }
        .due-date.overdue { background: #fee2e2; color: #dc2626; }
        .todo-actions { display: flex; gap: 4px; }
        .action-btn { width: 30px; height: 30px; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; }
        .action-btn.delete { background: #fee2e2; color: #dc2626; }
        .action-btn.delete:hover { background: #fecaca; transform: scale(1.1); }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
        
        /* Loading */
        .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; }
        .loading p { margin-top: 16px; color: var(--text-secondary); }
        
        /* Toast */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--primary); padding: 16px 32px; border-radius: 30px; color: #fff; font-weight: 600; font-size: 15px; box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4); z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        
        /* Bottom Navigation */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            display: flex; justify-content: center;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
        }
        .nav-inner { display: flex; gap: 8px; max-width: 400px; width: 100%; padding: 0 12px; }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 8px 16px; border-radius: 16px;
            cursor: pointer; transition: all 0.2s;
            border: none; background: transparent;
        }
        .nav-item .nav-icon { font-size: 24px; margin-bottom: 4px; }
        .nav-item .nav-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .nav-item.active { background: #f0fdf4; }
        .nav-item.active .nav-label { color: var(--primary); }
        .nav-item:active { transform: scale(0.95); }
        
        /* My Page */
        .my-page { display: none; }
        .my-page.show { display: block; }
        .profile-card { display: flex; flex-direction: column; align-items: center; padding: 32px 20px; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3); }
        .profile-email { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .profile-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
        .logout-btn { width: 100%; padding: 14px; background: #fee2e2; color: #dc2626; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { background: #fecaca; }
        .menu-card { background: var(--card-bg); border-radius: 20px; padding: 8px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .menu-item:hover { background: #f3f4f6; }
        .menu-icon { font-size: 20px; }
        .menu-text { font-size: 15px; color: var(--text); }
        .menu-arrow { margin-left: auto; color: #d1d5db; font-size: 14px; }
        
        .hidden { display: none !important; }
        
        /* Mobile */
        @media (max-width: 480px) {
            body { padding: 0; }
            .container { padding: 16px 12px 90px; }
            h1 { font-size: 24px; margin-bottom: 16px; }
            .card { padding: 16px; border-radius: 16px; }
            .auth-container { margin: 40px 16px; }
            .auth-card { padding: 24px; border-radius: 20px; }
            .form-row { flex-wrap: wrap; }
            .form-row .custom-select { flex: 1; min-width: calc(50% - 6px); }
            .form-row .date-input { flex: 1; min-width: calc(50% - 6px); }
            .tab-bar { flex-wrap: nowrap; overflow-x: auto; }
            .tab-btn { font-size: 12px; padding: 8px 6px; white-space: nowrap; }
            .todo-item { padding: 14px; }
            .todo-text { font-size: 14px; }
            .nav-inner { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <h1>✨ DoList</h1>
        
        <!-- 登录注册界面 -->
        <div class="auth-container" id="authContainer">
            <div class="auth-card">
                <div class="auth-title">欢迎使用 DoList</div>
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">登录</button>
                    <button class="auth-tab" data-tab="register">注册</button>
                </div>
                <form class="auth-form" id="authForm">
                    <div class="input-wrapper">
                        <input type="text" class="auth-input" id="authEmail" placeholder="邮箱地址" autocomplete="email">
                        <button type="button" class="input-clear" id="clearEmail">×</button>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" class="auth-input" id="authPassword" placeholder="密码" autocomplete="current-password">
                        <button type="button" class="input-clear" id="clearPassword">×</button>
                    </div>
                    <button type="submit" class="auth-btn" id="authBtn">登录</button>
                </form>
            </div>
        </div>
        
        <!-- 主应用界面 -->
        <div id="appContent">
            <!-- 待办页面 -->
            <div id="todoPage">
                <div class="card">
                    <form class="add-form" id="addForm">
                        <input type="text" id="todoInput" placeholder="添加新待办..." maxlength="200" autocomplete="off">
                        <div class="form-row">
                            <div class="custom-select" id="categorySelect">
                                <div class="select-btn"><span class="select-value">🏢 工作</span><span class="arrow">▼</span></div>
                                <div class="select-dropdown">
                                    <div class="select-option selected" data-value="work">🏢 工作</div>
                                    <div class="select-option" data-value="life">🏠 生活</div>
                                    <div class="select-option" data-value="study">📚 学习</div>
                                </div>
                            </div>
                            <div class="custom-select" id="prioritySelect">
                                <div class="select-btn"><span class="select-value">○ 普通</span><span class="arrow">▼</span></div>
                                <div class="select-dropdown">
                                    <div class="select-option selected" data-value="normal">○ 普通</div>
                                    <div class="select-option" data-value="urgent">⚡ 紧急</div>
                                </div>
                            </div>
                            <input type="date" class="date-input" id="dueDateInput">
                            <button type="submit" class="btn btn-primary" id="addBtn">添加</button>
                        </div>
                    </form>
                </div>
                
                <div class="stats">
                    <div>共 <strong id="totalCount">0</strong> 项 · 已完成 <strong id="completedCount">0</strong> 项 · 进行中 <strong id="ongoingCount">0</strong> 项</div>
                    <span class="sync-status synced" id="syncStatus">已同步</span>
                </div>
                
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="ongoing">进行中</button>
                    <button class="filter-btn" data-filter="completed">已完成</button>
                </div>
                
                <div class="tab-bar">
                    <button class="tab-btn active" data-category="all">全部</button>
                    <button class="tab-btn" data-category="work">🏢</button>
                    <button class="tab-btn" data-category="life">🏠</button>
                    <button class="tab-btn" data-category="study">📚</button>
                </div>
                
                <div id="todoList">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
            
            <!-- 我的页面 -->
            <div id="myPage" class="my-page">
                <div class="card profile-card">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-email" id="profileEmail"></div>
                    <div class="profile-sub">待办清单用户</div>
                    <button class="logout-btn" id="logoutBtn">退出登录</button>
                </div>
                
                <div class="menu-card">
                    <div class="menu-item">
                        <span class="menu-icon">📋</span>
                        <span class="menu-text">我的待办</span>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <span class="menu-icon">⚙️</span>
                        <span class="menu-text">设置</span>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <span class="menu-icon">💡</span>
                        <span class="menu-text">关于</span>
                        <span class="menu-arrow">›</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="nav-inner">
            <button class="nav-item active" data-page="todo">
                <span class="nav-icon">📋</span>
                <span class="nav-label">待办</span>
            </button>
            <button class="nav-item" data-page="my">
                <span class="nav-icon">👤</span>
                <span class="nav-label">我的</span>
            </button>
        </div>
    </nav>

    <script>
        const API = 'https://cbsjlqnfwqtbydubcrpj.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNic2pscW5md3F0YnlkdWJjcnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTQ4ODUsImV4cCI6MjA4OTU5MDg4NX0.AZZCotXt-EZP3hl1RoW_PUjWPfcnmdbAvYIxtFN7h2Q';
        
        let user = null;
        let todos = [];
        let currentFilter = 'all';
        let currentCategory = 'all';
        let currentPage = 'todo';
        let authTab = 'login';
        let categoryValue = 'work';
        let priorityValue = 'normal';
        
        // Elements
        const authContainer = document.getElementById('authContainer');
        const appContent = document.getElementById('appContent');
        const todoPage = document.getElementById('todoPage');
        const myPage = document.getElementById('myPage');
        const bottomNav = document.getElementById('bottomNav');
        const authForm = document.getElementById('authForm');
        const authEmail = document.getElementById('authEmail');
        const authBtn = document.getElementById('authBtn');
        const profileEmail = document.getElementById('profileEmail');
        const logoutBtn = document.getElementById('logoutBtn');
        const addForm = document.getElementById('addForm');
        const todoInput = document.getElementById('todoInput');
        const dueDateInput = document.getElementById('dueDateInput');
        const todoList = document.getElementById('todoList');
        const totalCount = document.getElementById('totalCount');
        const completedCount = document.getElementById('completedCount');
        const ongoingCount = document.getElementById('ongoingCount');
        const syncStatus = document.getElementById('syncStatus');
        const addBtn = document.getElementById('addBtn');
        const toast = document.getElementById('toast');
        const clearEmail = document.getElementById('clearEmail');
        const clearPassword = document.getElementById('clearPassword');
        const authPassword = document.getElementById('authPassword');
        const categorySelect = document.getElementById('categorySelect');
        const prioritySelect = document.getElementById('prioritySelect');
        
        // Toast
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function setSyncStatus(status, text) {
            syncStatus.className = 'sync-status ' + status;
            syncStatus.textContent = text;
        }
        
        // Custom Select
        function initCustomSelect(el, onChange) {
            const btn = el.querySelector('.select-btn');
            const opts = el.querySelectorAll('.select-option');
            
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.custom-select.open').forEach(s => {
                    if (s !== el) s.classList.remove('open');
                });
                el.classList.toggle('open');
            });
            
            opts.forEach(opt => {
                opt.addEventListener('click', () => {
                    const val = opt.dataset.value;
                    const text = opt.textContent;
                    el.querySelector('.select-value').textContent = text;
                    opts.forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    el.classList.remove('open');
                    if (onChange) onChange(val, text);
                });
            });
            
            document.addEventListener('click', () => el.classList.remove('open'));
        }
        
        initCustomSelect(categorySelect, (val) => { categoryValue = val; });
        initCustomSelect(prioritySelect, (val) => { priorityValue = val; });
        
        // Bottom Nav
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                
                if (page === 'todo') {
                    todoPage.classList.remove('hidden');
                    todoPage.style.display = '';
                    myPage.classList.remove('show');
                    myPage.style.display = 'none';
                } else {
                    todoPage.classList.add('hidden');
                    todoPage.style.display = 'none';
                    myPage.classList.add('show');
                    myPage.style.display = '';
                }
                currentPage = page;
            });
        });
        
        // 清除按钮
        function toggleClear(btn, input) {
            btn.classList.toggle('show', input.value.length > 0);
        }
        clearEmail.addEventListener('click', () => { authEmail.value = ''; clearEmail.classList.remove('show'); });
        clearPassword.addEventListener('click', () => { authPassword.value = ''; clearPassword.classList.remove('show'); });
        authEmail.addEventListener('input', () => toggleClear(clearEmail, authEmail));
        authPassword.addEventListener('input', () => toggleClear(clearPassword, authPassword));
        
        // Auth tabs
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                authTab = tab.dataset.tab;
                authBtn.textContent = authTab === 'login' ? '登录' : '注册';
            });
        });
        
        // 注册
        async function registerWithEmail(email, password) {
            authBtn.disabled = true;
            authBtn.textContent = '注册中...';
            try {
                const res = await fetch(API + '/auth/v1/signup', {
                    method: 'POST',
                    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) { showToast(data.msg || data.error_description || '注册失败'); }
                else { showToast('验证邮件已发送，请去邮箱点击确认链接'); }
            } catch (e) { showToast('网络错误'); }
            authBtn.disabled = false;
            authBtn.textContent = '注册';
        }
        
        // 登录
        async function loginWithPassword(email, password) {
            authBtn.disabled = true;
            authBtn.textContent = '登录中...';
            try {
                const res = await fetch(API + '/auth/v1/token?grant_type=password', {
                    method: 'POST',
                    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    let msg = data.error_description || data.msg || '登录失败';
                    if (msg.toLowerCase().includes('email not confirmed')) msg = '请先去邮箱点击确认链接';
                    else if (msg.toLowerCase().includes('invalid login credentials')) msg = '请先注册';
                    showToast(msg);
                } else {
                    user = data.user;
                    localStorage.setItem('supabase_token', data.access_token);
                    afterLogin();
                }
            } catch (e) { showToast('登录失败'); }
            authBtn.disabled = false;
            authBtn.textContent = '登录';
        }
        
        function afterLogin() {
            profileEmail.textContent = user.email;
            authContainer.classList.add('hidden');
            appContent.classList.add('show');
            bottomNav.style.display = '';
            document.querySelector('.nav-item[data-page="todo"]').click();
            showToast('登录成功');
            fetchTodos();
        }
        
        // 表单提交
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = authEmail.value.trim();
            const password = authPassword.value;
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('请输入正确邮箱格式'); return; }
            if (!password) { showToast('请输入密码'); return; }
            if (authTab === 'login') { await loginWithPassword(email, password); }
            else {
                if (password.length < 6) { showToast('密码至少6位'); return; }
                await registerWithEmail(email, password);
            }
        });
        
        // Logout
        logoutBtn.addEventListener('click', () => {
            user = null; todos = [];
            localStorage.removeItem('supabase_token');
            authContainer.classList.remove('hidden');
            appContent.classList.remove('show');
            bottomNav.style.display = 'none';
            authEmail.value = ''; authPassword.value = '';
            clearEmail.classList.remove('show'); clearPassword.classList.remove('show');
            showToast('已退出登录');
        });
        
        // Auto login
        async function init() {
            const token = localStorage.getItem('supabase_token');
            if (token) {
                try {
                    const res = await fetch(API + '/auth/v1/user', {
                        headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + token }
                    });
                    if (res.ok) {
                        user = await res.json();
                        afterLogin();
                        return;
                    }
                } catch (e) { console.error('Auto login failed:', e); }
                localStorage.removeItem('supabase_token');
            }
            authContainer.classList.remove('hidden');
            appContent.classList.remove('show');
            bottomNav.style.display = 'none';
            toggleClear(clearEmail, authEmail);
            toggleClear(clearPassword, authPassword);
        }
        
        async function api(path, options = {}, token) {
            const tk = token || localStorage.getItem('supabase_token');
            const res = await fetch(API + '/rest/v1' + path, {
                ...options,
                headers: {
                    'apikey': KEY,
                    'Authorization': 'Bearer ' + tk,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation',
                    ...options.headers
                }
            });
            if (!res.ok) { throw new Error(err || '请求失败'); }
            const text = await res.text();
            return text ? JSON.parse(text) : null;
        }
        
        async function fetchTodos(token) {
            setSyncStatus('syncing', '同步中...');
            try {
                const data = await api('/todos?user_id=eq.' + encodeURIComponent(user.id) + '&select=*&order=created_at.desc', {}, token);
                todos = data || [];
                saveLocal();
                render();
                setSyncStatus('synced', '已同步');
            } catch (e) {
                console.error('Fetch error:', e);
                setSyncStatus('error', '同步失败');
                const cached = localStorage.getItem('dolist_todos');
                if (cached) todos = JSON.parse(cached);
                render();
            }
        }
        
        async function addTodo(text, category, priority, dueDate) {
            try {
                const newTodo = await api('/todos', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: user.id, text, category, priority, due_date: dueDate || null }),
                    headers: { 'Prefer': 'return=representation' }
                });
                if (newTodo && newTodo[0]) {
                    todos.unshift(newTodo[0]);
                    saveLocal();
                    render();
                    showToast('添加成功');
                }
            } catch (e) { console.error('Add error:', e); showToast('添加失败'); }
        }
        
        async function toggleComplete(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            const newCompleted = !todo.completed;
            try {
                await api('/todos?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ completed: newCompleted }) });
                todo.completed = newCompleted;
                saveLocal();
                render();
            } catch (e) { console.error('Toggle error:', e); showToast('更新失败'); }
        }
        
        async function deleteTodo(id) {
            try {
                await api('/todos?id=eq.' + id, { method: 'DELETE' });
                todos = todos.filter(t => t.id !== id);
                saveLocal();
                render();
                showToast('已删除');
            } catch (e) { console.error('Delete error:', e); showToast('删除失败'); }
        }
        
        function saveLocal() { localStorage.setItem('dolist_todos', JSON.stringify(todos)); }
        
        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = todoInput.value.trim();
            if (!text) return;
            addBtn.disabled = true;
            await addTodo(text, categoryValue, priorityValue, dueDateInput.value);
            todoInput.value = '';
            dueDateInput.value = '';
            addBtn.disabled = false;
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                render();
            });
        });
        
        function render() {
            let filtered = todos.filter(t => {
                if (currentFilter === 'ongoing' && t.completed) return false;
                if (currentFilter === 'completed' && !t.completed) return false;
                if (currentCategory !== 'all' && t.category !== currentCategory) return false;
                return true;
            });
            
            totalCount.textContent = todos.length;
            completedCount.textContent = todos.filter(t => t.completed).length;
            ongoingCount.textContent = todos.filter(t => !t.completed).length;
            
            if (filtered.length === 0) {
                todoList.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>' + (todos.length === 0 ? '暂无待办，添加一个吧' : '没有符合条件的待办') + '</p></div>';
                return;
            }
            
            const categoryNames = { work: '工作', life: '生活', study: '学习' };
            const priorityLabels = { urgent: '⚡ 紧急', normal: '○ 普通' };
            
            todoList.innerHTML = filtered.map(todo => {
                let dueDateStr = '';
                if (todo.due_date) {
                    const d = new Date(todo.due_date);
                    const today = new Date();
                    const tomorrow = new Date(today);
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    if (d.toDateString() === today.toDateString()) dueDateStr = '今天';
                    else if (d.toDateString() === tomorrow.toDateString()) dueDateStr = '明天';
                    else dueDateStr = (d.getMonth()+1) + '/' + d.getDate();
                }
                const isOverdue = todo.due_date && !todo.completed && new Date(todo.due_date) < new Date(new Date().toDateString());
                
                return '<div class="todo-item ' + (todo.completed ? 'completed' : '') + '">' +
                    '<div class="todo-checkbox" onclick="toggleComplete(\'' + todo.id + '\')">' + (todo.completed ? '✓' : '') + '</div>' +
                    '<div class="todo-content">' +
                    '<div class="todo-text">' + escapeHtml(todo.text) + '</div>' +
                    '<div class="todo-meta">' +
                    '<span class="tag tag-' + todo.category + '">' + categoryNames[todo.category] + '</span>' +
                    '<span class="tag tag-' + todo.priority + '">' + priorityLabels[todo.priority] + '</span>' +
                    (dueDateStr ? '<span class="due-date ' + (isOverdue ? 'overdue' : '') + '">' + (isOverdue ? '⚠️ ' : '') + dueDateStr + '</span>' : '') +
                    '</div></div>' +
                    '<div class="todo-actions"><button class="action-btn delete" onclick="deleteTodo(\'' + todo.id + '\')">🗑️</button></div>' +
                    '</div>';
            }).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        init();
    </script>
</body>
</html>
