<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Trigger Vercel deploy 2026-03-21 -->
    <title>DoList - 待办清单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-light: #34d399;
            --primary-dark: #059669;
            --bg: #f0fdf4;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 20%, rgba(16, 185, 129, 0.08) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
            color: var(--text);
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px 90px; }
        h1 { text-align: center; font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 20px; padding: 16px 0; }
        
        /* Auth */
        .auth-container { max-width: 400px; margin: 60px auto; }
        .auth-card { background: var(--card-bg); border-radius: 24px; padding: 32px; box-shadow: var(--shadow); }
        .auth-title { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
        .auth-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #f3f4f6; padding: 4px; border-radius: 14px; }
        .auth-tab { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
        .auth-tab.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .input-wrapper { position: relative; }
        .auth-input { width: 100%; padding: 14px 40px 14px 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; transition: all 0.2s; }
        .auth-input:focus { border-color: var(--primary); background: #f0fdf4; }
        .input-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; font-size: 20px; color: #d1d5db; display: none; padding: 4px; line-height: 1; }
        .input-clear:hover { color: #9ca3af; }
        .input-clear.show { display: block; }
        .auth-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .auth-btn:hover { background: var(--primary-light); }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* App Content */
        #appContent { display: none; }
        #appContent.show { display: block; }
        
        /* Card */
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
        
        /* Add Form */
        .add-form { display: flex; flex-direction: column; gap: 12px; }
        .add-form input[type="text"] { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 14px; font-size: 15px; outline: none; transition: all 0.2s; }
        .add-form input[type="text"]:focus { border-color: var(--primary); background: #f0fdf4; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        /* Custom Select Dropdowns */
        .custom-select { position: relative; }
        .select-btn { 
            display: flex; align-items: center; gap: 6px; 
            padding: 10px 14px; 
            background: #f3f4f6; 
            border: 2px solid transparent; 
            border-radius: 12px; 
            font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            color: var(--text);
            user-select: none;
        }
        .select-btn:hover { background: #e5e7eb; }
        .select-btn .arrow { font-size: 10px; transition: transform 0.2s; }
        .custom-select.open .select-btn { 
            background: var(--primary); color: #fff; 
            border-color: var(--primary);
        }
        .custom-select.open .arrow { transform: rotate(180deg); }
        .select-dropdown {
            position: absolute; top: calc(100% + 6px); left: 0;
            min-width: 140px; background: #fff;
            border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 100; overflow: hidden;
            opacity: 0; transform: translateY(-8px);
            pointer-events: none; transition: all 0.2s;
        }
        .custom-select.open .select-dropdown {
            opacity: 1; transform: translateY(0);
            pointer-events: auto;
        }
        .select-option {
            padding: 12px 16px; cursor: pointer;
            transition: background 0.15s;
            font-size: 14px;
        }
        .select-option:hover { background: #f3f4f6; }
        .select-option.selected { background: #f0fdf4; color: var(--primary); font-weight: 600; }
        
        /* Date Picker - Custom Style */
        .date-select { position: relative; }
        .date-btn { 
            display: flex; align-items: center; gap: 6px; 
            padding: 10px 14px; 
            background: #f3f4f6; 
            border: 2px solid transparent; 
            border-radius: 12px; 
            font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            color: var(--text);
            user-select: none;
            white-space: nowrap;
        }
        .date-btn:hover { background: #e5e7eb; }
        .date-btn .arrow { font-size: 10px; transition: transform 0.2s; }
        .date-select.open .date-btn { 
            background: var(--primary); color: #fff; 
            border-color: var(--primary);
        }
        .date-select.open .arrow { transform: rotate(180deg); }
        .date-dropdown {
            position: absolute; top: calc(100% + 6px); left: 0;
            background: #fff; border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 100; padding: 12px;
            opacity: 0; transform: translateY(-8px);
            pointer-events: none; transition: all 0.2s;
            min-width: 280px;
        }
        .date-select.open .date-dropdown {
            opacity: 1; transform: translateY(0);
            pointer-events: auto;
        }
        .date-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .date-nav { width: 32px; height: 32px; border: none; background: #f3f4f6; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .date-nav:hover { background: #e5e7eb; }
        .date-month-year { font-size: 14px; font-weight: 600; color: var(--text); }
        .date-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
        .date-day-header { font-size: 11px; color: var(--text-secondary); font-weight: 500; padding: 6px 0; }
        .date-day { width: 36px; height: 36px; border: none; background: transparent; border-radius: 50%; cursor: pointer; font-size: 13px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
        .date-day:hover { background: #f3f4f6; }
        .date-day.other-month { color: #d1d5db; }
        .date-day.today { border: 2px solid var(--primary); color: var(--primary); font-weight: 600; }
        .date-day.selected { background: var(--primary); color: #fff; font-weight: 600; }
        .date-day.selected:hover { background: var(--primary-dark); }
        .date-today-btn { width: 100%; padding: 8px; border: none; background: #f3f4f6; border-radius: 8px; font-size: 12px; cursor: pointer; color: var(--text-secondary); margin-top: 8px; transition: all 0.15s; }
        .date-today-btn:hover { background: #e5e7eb; color: var(--text); }
        
        /* Reminder Row */
        .reminder-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            width: 100%;
            padding: 8px 0;
        }
        .reminder-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }
        .reminder-toggle input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .toggle-text {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .reminder-options {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .reminder-quick-btns {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .reminder-quick-btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text);
        }
        .reminder-quick-btn:hover {
            background: #f0fdf4;
            border-color: var(--primary);
        }
        .reminder-quick-btn.selected {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .reminder-custom-btn {
            padding: 4px 10px;
            border: 1px dashed var(--border);
            background: transparent;
            border-radius: 14px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .reminder-custom-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .reminder-custom-input {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .reminder-custom-input input {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
        }
        .date-time-row { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; align-items: center; }
        .date-time-label { font-size: 12px; color: var(--text-secondary); }
        .date-time-input { flex: 1; padding: 8px 10px; border: 2px solid #f3f4f6; border-radius: 8px; font-size: 13px; outline: none; background: #f9f9f9; }
        .date-time-input:focus { border-color: var(--primary); background: #fff; }
        
        /* Time Picker */
        .time-select { position: relative; }
        .time-btn { 
            display: flex; align-items: center; gap: 6px; 
            padding: 10px 14px; 
            background: #f3f4f6; 
            border: 2px solid transparent; 
            border-radius: 12px; 
            font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            color: var(--text);
            user-select: none;
            white-space: nowrap;
        }
        .time-btn:hover { background: #e5e7eb; }
        .time-btn .arrow { font-size: 10px; transition: transform 0.2s; }
        .time-select.open .time-btn { background: var(--primary); color: #fff; border-color: var(--primary); }
        .time-select.open .arrow { transform: rotate(180deg); }
        .time-dropdown {
            position: absolute; top: calc(100% + 6px); left: 0;
            background: #fff; border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 100; padding: 8px;
            opacity: 0; transform: translateY(-8px);
            pointer-events: none; transition: all 0.2s;
            max-height: 200px; overflow-y: auto;
            min-width: 120px;
        }
        .time-select.open .time-dropdown {
            opacity: 1; transform: translateY(0);
            pointer-events: auto;
        }
        .time-option { padding: 10px 14px; cursor: pointer; font-size: 14px; border-radius: 8px; transition: background 0.15s; }
        .time-option:hover { background: #f3f4f6; }
        .time-option.selected { background: #f0fdf4; color: var(--primary); font-weight: 600; }
        
        /* Add Button */
        .btn { padding: 12px 24px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-light); transform: scale(1.02); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        /* Stats */
        .stats { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: linear-gradient(135deg, #f0fdf4 0%, #d1fae5 100%); border-radius: 14px; margin-bottom: 16px; font-size: 13px; color: var(--text-secondary); }
        .stats strong { color: var(--primary); font-size: 15px; }
        .sync-status { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .sync-status.synced { background: #d1fae5; color: #065f46; }
        .sync-status.syncing { background: #fef3c7; color: #92400e; }
        .sync-status.offline { background: #f3f4f6; color: #6b7280; }
        .sync-status.error { background: #fee2e2; color: #991b1b; }
        
        /* Filters */
        .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .filter-btn { padding: 8px 16px; border: 2px solid var(--border); border-radius: 20px; background: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .filter-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; }
        
        /* Category Tabs */
        .tab-bar { display: flex; gap: 6px; margin-bottom: 16px; background: #f3f4f6; padding: 5px; border-radius: 14px; }
        .tab-btn { flex: 1; padding: 10px 8px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
        .tab-btn.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        /* Todo List */
        .todo-list { list-style: none; }
        .todo-item { display: flex; align-items: flex-start; gap: 12px; padding: 16px; background: var(--card-bg); border-radius: 16px; margin-bottom: 10px; box-shadow: var(--shadow); transition: all 0.2s; }
        .todo-item:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .todo-item.completed { opacity: 0.6; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-secondary); }
        .todo-checkbox { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; margin-top: 1px; background: #fff; }
        .todo-checkbox:hover { border-color: var(--primary); background: #f0fdf4; }
        .todo-item.completed .todo-checkbox { background: var(--primary); border-color: var(--primary); color: #fff; }
        .todo-content { flex: 1; min-width: 0; }
        .todo-text { font-size: 15px; margin-bottom: 8px; word-break: break-word; line-height: 1.5; }
        .todo-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 12px; }
        .tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .tag-work { background: #dbeafe; color: #1d4ed8; }
        .tag-life { background: #fce7f3; color: #be185d; }
        .tag-study { background: #fef3c7; color: #b45309; }
        .tag-urgent { background: #fee2e2; color: #dc2626; }
        .tag-normal { background: #f3f4f6; color: #6b7280; }
        .due-date { padding: 4px 10px; border-radius: 20px; background: #f3f4f6; color: var(--text-secondary); font-size: 11px; font-weight: 500; }
        .due-date.overdue { background: #fee2e2; color: #dc2626; }
        .due-date.remind { background: #dbeafe; color: #1d4ed8; }
        .todo-actions { display: flex; gap: 4px; }
        .action-btn { width: 30px; height: 30px; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; }
        .action-btn.delete { background: #fee2e2; color: #dc2626; }
        .action-btn.delete:hover { background: #fecaca; transform: scale(1.1); }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
        
        /* Loading */
        .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; }
        .loading p { margin-top: 16px; color: var(--text-secondary); }
        
        /* Toast */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--primary); padding: 16px 32px; border-radius: 30px; color: #fff; font-weight: 600; font-size: 15px; box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4); z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        
        /* Bottom Navigation */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            display: none; justify-content: center;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
        }
        .nav-inner { display: flex; gap: 8px; max-width: 400px; width: 100%; padding: 0 12px; }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 8px 16px; border-radius: 16px;
            cursor: pointer; transition: all 0.2s;
            border: none; background: transparent;
        }
        .nav-item .nav-icon { font-size: 24px; margin-bottom: 4px; }
        .nav-item .nav-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .nav-item.active { background: #f0fdf4; }
        .nav-item.active .nav-label { color: var(--primary); }
        .nav-item:active { transform: scale(0.95); }
        
        /* My Page */
        .my-page { display: none; }
        .my-page.show { display: block; }
        .profile-card { display: flex; flex-direction: column; align-items: center; padding: 32px 20px; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3); }
        .profile-email { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .profile-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
        .logout-btn { width: 100%; padding: 14px; background: #fee2e2; color: #dc2626; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { background: #fecaca; }
        .menu-card { background: var(--card-bg); border-radius: 20px; padding: 8px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .menu-item:hover { background: #f3f4f6; }
        .menu-icon { font-size: 20px; }
        .menu-text { font-size: 15px; color: var(--text); }
        .menu-arrow { margin-left: auto; color: #d1d5db; font-size: 14px; }
        
        .hidden { display: none !important; }
        
        /* Mobile */
        @media (max-width: 480px) {
            body { padding: 0; }
            .container { padding: 16px 12px 90px; }
            h1 { font-size: 24px; margin-bottom: 16px; }
            .card { padding: 16px; border-radius: 16px; }
            .auth-container { margin: 40px 16px; }
            .auth-card { padding: 24px; border-radius: 20px; }
            .form-row { flex-wrap: wrap; }
            .form-row .custom-select { flex: 1; min-width: calc(50% - 6px); }
            .form-row .date-input { flex: 1; min-width: calc(50% - 6px); }
            .tab-bar { flex-wrap: nowrap; overflow-x: auto; }
            .tab-btn { font-size: 12px; padding: 8px 6px; white-space: nowrap; }
            .todo-item { padding: 14px; }
            .todo-text { font-size: 14px; }
            .nav-inner { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <h1>✨ DoList</h1>
        
        <!-- 登录注册界面 -->
        <div class="auth-container" id="authContainer">
            <div class="auth-card">
                <div class="auth-title">欢迎使用 DoList</div>
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">登录</button>
                    <button class="auth-tab" data-tab="register">注册</button>
                </div>
                <form class="auth-form" id="authForm">
                    <div class="input-wrapper">
                        <input type="text" class="auth-input" id="authEmail" placeholder="邮箱地址" autocomplete="email">
                        <button type="button" class="input-clear" id="clearEmail">×</button>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" class="auth-input" id="authPassword" placeholder="密码" autocomplete="current-password">
                        <button type="button" class="input-clear" id="clearPassword">×</button>
                    </div>
                    <button type="submit" class="auth-btn" id="authBtn">登录</button>
                </form>
            </div>
        </div>
        
        <!-- 主应用界面 -->
        <div id="appContent">
            <!-- 待办页面 -->
            <div id="todoPage">
                <div class="card">
                    <form class="add-form" id="addForm">
                        <input type="text" id="todoInput" placeholder="添加新待办..." maxlength="200" autocomplete="off">
                        <div class="form-row">
                            <div class="custom-select" id="categorySelect">
                                <div class="select-btn"><span class="select-value">🏢 工作</span><span class="arrow">▼</span></div>
                                <div class="select-dropdown">
                                    <div class="select-option selected" data-value="work">🏢 工作</div>
                                    <div class="select-option" data-value="life">🏠 生活</div>
                                    <div class="select-option" data-value="study">📚 学习</div>
                                </div>
                            </div>
                            <div class="custom-select" id="prioritySelect">
                                <div class="select-btn"><span class="select-value">○ 普通</span><span class="arrow">▼</span></div>
                                <div class="select-dropdown">
                                    <div class="select-option selected" data-value="normal">○ 普通</div>
                                    <div class="select-option" data-value="urgent">⚡ 紧急</div>
                                </div>
                            </div>
                            <div class="date-select" id="dateSelect">

        function formatDateDisplay(dateStr) {
            if (!dateStr) return '📅 截止日期';
            const d = new Date(dateStr);
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const timeStr = d.toTimeString().slice(0,5);
            if (d.toDateString() === today.toDateString()) return '📅 今天 ' + timeStr;
            if (d.toDateString() === tomorrow.toDateString()) return '📅 明天 ' + timeStr;
            const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
            return '📅 ' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + weekdays[d.getDay()] + ' ' + timeStr;
        }
        
        function renderDatePicker() {
            const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            dateMonthYear.textContent = currentYear + ' ' + months[currentMonth];
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];

            // Prev month days
            for (let i = firstDay - 1; i >= 0; i--) {
                html += '<button class="date-day other-month" data-day="' + (daysInPrevMonth - i) + '" data-month="prev">' + (daysInPrevMonth - i) + '</button>';
            }
            
            // Current month days
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-' + String(i).padStart(2, '0');
                let cls = 'date-day';
                if (dateStr === todayStr) cls += ' today';
                if (dateStr === dateValue) cls += ' selected';
                html += '<button class="' + cls + '" data-day="' + i + '" data-month="current">' + i + '</button>';
            }
            
            // Next month days
            const totalCells = firstDay + daysInMonth;
            const remaining = 42 - totalCells;
            for (let i = 1; i <= remaining; i++) {
                html += '<button class="date-day other-month" data-day="' + i + '" data-month="next">' + i + '</button>';

                    dateBtn.querySelector('.date-value').textContent = formatDateDisplay(dateValue);
                    dateSelect.classList.remove('open');
                    renderDatePicker();
                });
            });
        }

                            const d = new Date(datePart);
                            d.setDate(d.getDate() - 1);
                            remindDate = d.toISOString().split('T')[0];
                        }
                        remindAt = remindDate + ' ' + String(remindHour).padStart(2,'0') + ':' + String(minute).padStart(2,'0') + ':00';
                    } else if (selectedRemindValue === '3hour') {
                        let remindHour = hour - 3;
                        let remindDate = datePart;
                        if (remindHour < 0) {
                            remindHour += 24;
                            const d = new Date(datePart);
                            d.setDate(d.getDate() - 1);
                            remindDate = d.toISOString().split('T')[0];
                        }
                        remindAt = remindDate + ' ' + String(remindHour).padStart(2,'0') + ':' + String(minute).padStart(2,'0') + ':00';
                    } else if (selectedRemindValue === '1day') {
                        const d = new Date(datePart);
                        d.setDate(d.getDate() - 1);
                        remindAt = d.toISOString().split('T')[0] + ' ' + timePart;
                    } else if (selectedRemindValue === '1week') {
                        const d = new Date(datePart);
                        d.setDate(d.getDate() - 7);
                        remindAt = d.toISOString().split('T')[0] + ' ' + timePart;
                    } else if (selectedRemindValue === 'duetime') {
                        remindAt = dateValue.replace('T', ' ');
                    }
                }
            }
            
            // 存储的 due_date 只取日期部分
            const dueDateStr = dateValue ? dateValue.split('T')[0] : null;
            
            await addTodo(text, categoryValue, priorityValue, dueDateStr, remindAt);
            todoInput.value = '';
            dateValue = '';
            dateBtn.querySelector('.date-value').textContent = '📅 截止日期';
            // Reset reminder
            remindToggle.checked = false;
            remindOptions.style.display = 'none';
            reminderCustomInput.style.display = 'none';
            reminderCustomBtn.style.display = '';
            selectedRemindValue = null;
            customRemindInput.value = '';
            addBtn.disabled = false;
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                render();
            });
        });
        
        function render() {
            let filtered = todos.filter(t => {
                if (currentFilter === 'ongoing' && t.completed) return false;
                if (currentFilter === 'completed' && !t.completed) return false;
                if (currentCategory !== 'all' && t.category !== currentCategory) return false;
                return true;
            });
            
            totalCount.textContent = todos.length;
            completedCount.textContent = todos.filter(t => t.completed).length;
            ongoingCount.textContent = todos.filter(t => !t.completed).length;
            
            if (filtered.length === 0) {
                todoList.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>' + (todos.length === 0 ? '暂无待办，添加一个吧' : '没有符合条件的待办') + '</p></div>';
                return;
            }
            
            const categoryNames = { work: '工作', life: '生活', study: '学习' };
            const priorityLabels = { urgent: '⚡ 紧急', normal: '○ 普通' };
            
            todoList.innerHTML = filtered.map(todo => {
                let dueDateStr = '';
                if (todo.due_date) {
                    const d = new Date(todo.due_date);
                    const today = new Date();
                    const tomorrow = new Date(today);
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    if (d.toDateString() === today.toDateString()) dueDateStr = '今天';
                    else if (d.toDateString() === tomorrow.toDateString()) dueDateStr = '明天';
                    else dueDateStr = (d.getMonth()+1) + '/' + d.getDate();
                }
                const isOverdue = todo.due_date && !todo.completed && new Date(todo.due_date) < new Date(new Date().toDateString());
                
                // 提醒时间显示
                let remindStr = '';
                if (todo.remind_at && !todo.completed) {
                    // 手动解析本地时间字符串，因为 new Date() 会把没有时区的字符串当作 UTC 处理
                    const remindParts = todo.remind_at.split(/[- :]/);
                    const r = new Date(remindParts[0], remindParts[1]-1, remindParts[2], remindParts[3], remindParts[4], remindParts[5] || 0);
                    const now = new Date();
                    if (r > now) {
                        const diffMs = r.getTime() - now.getTime();
                        const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                        const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                        if (diffHours >= 24) remindStr = '🔔 ' + Math.floor(diffHours/24) + '天' + (diffHours%24) + '小时后';
                        else if (diffHours >= 1) remindStr = '🔔 ' + diffHours + '小时后';
                        else remindStr = '🔔 ' + diffMins + '分钟后';
                    } else {
                        remindStr = '🔔 即将到期';
                    }
                }
                
                return '<div class="todo-item ' + (todo.completed ? 'completed' : '') + '">' +
                    '<div class="todo-checkbox" onclick="toggleComplete(\'' + todo.id + '\')">' + (todo.completed ? '✓' : '') + '</div>' +
                    '<div class="todo-content">' +
                    '<div class="todo-text">' + escapeHtml(todo.text) + '</div>' +
                    '<div class="todo-meta">' +
                    '<span class="tag tag-' + todo.category + '">' + categoryNames[todo.category] + '</span>' +
                    '<span class="tag tag-' + todo.priority + '">' + priorityLabels[todo.priority] + '</span>' +
                    (dueDateStr ? '<span class="due-date ' + (isOverdue ? 'overdue' : '') + '">' + (isOverdue ? '⚠️ ' : '') + dueDateStr + '</span>' : '') +
                    (remindStr ? '<span class="due-date remind">' + remindStr + '</span>' : '') +
                    '</div></div>' +
                    '<div class="todo-actions"><button class="action-btn delete" onclick="deleteTodo(\'' + todo.id + '\')">🗑️</button></div>' +
                    '</div>';
            }).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        init();
    </script>
</body>
</html>
