<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoList - 待办清单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #10b981;
            --primary-light: #34d399;
            --bg: #f0fdf4;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --urgent: #ef4444;
            --normal: #6b7280;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
            color: var(--text);
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 24px;
            padding: 20px 0;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .add-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .add-form input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        .add-form input[type="text"]:focus {
            border-color: var(--primary);
        }
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .form-row select, .form-row input[type="date"] {
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
            outline: none;
        }
        .form-row select:focus, .form-row input[type="date"]:focus {
            border-color: var(--primary);
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(16, 185, 129, 0.08);
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .stats strong {
            color: var(--primary);
        }
        .todo-list {
            list-style: none;
        }
        .todo-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            transition: all 0.2s;
        }
        .todo-item.completed {
            opacity: 0.6;
        }
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }
        .todo-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            margin-top: 2px;
        }
        .todo-checkbox:hover {
            border-color: var(--primary);
        }
        .todo-item.completed .todo-checkbox {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .todo-content {
            flex: 1;
            min-width: 0;
        }
        .todo-text {
            font-size: 15px;
            margin-bottom: 6px;
            word-break: break-word;
        }
        .todo-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .tag {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .tag-work { background: #dbeafe; color: #1d4ed8; }
        .tag-life { background: #fce7f3; color: #be185d; }
        .tag-study { background: #fef3c7; color: #b45309; }
        .tag-urgent { background: #fee2e2; color: #dc2626; }
        .tag-normal { background: #f3f4f6; color: #6b7280; }
        .due-date {
            padding: 3px 8px;
            border-radius: 6px;
            background: #f3f4f6;
        }
        .due-date.overdue {
            background: #fee2e2;
            color: #dc2626;
        }
        .todo-actions {
            display: flex;
            gap: 6px;
        }
        .action-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }
        .action-btn.delete {
            background: #fee2e2;
            color: #dc2626;
        }
        .action-btn.delete:hover {
            background: #fecaca;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-state p {
            font-size: 15px;
        }
        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: #f3f4f6;
            padding: 4px;
            border-radius: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        .tab-btn.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 DoList</h1>
        
        <!-- 添加待办 -->
        <div class="card">
            <form class="add-form" id="addForm">
                <input type="text" id="todoInput" placeholder="添加新待办..." maxlength="200" autocomplete="off">
                <div class="form-row">
                    <select id="categorySelect">
                        <option value="work">🏢 工作</option>
                        <option value="life">🏠 生活</option>
                        <option value="study">📚 学习</option>
                    </select>
                    <select id="prioritySelect">
                        <option value="normal">○ 普通</option>
                        <option value="urgent">⚡ 紧急</option>
                    </select>
                    <input type="date" id="dueDateInput">
                    <button type="submit" class="btn btn-primary">添加</button>
                </div>
            </form>
        </div>
        
        <!-- 统计 -->
        <div class="stats" id="stats">
            共 <strong id="totalCount">0</strong> 项 · 
            已完成 <strong id="completedCount">0</strong> 项 · 
            进行中 <strong id="ongoingCount">0</strong> 项
        </div>
        
        <!-- 筛选 -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="ongoing">进行中</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
        </div>
        
        <!-- 分类 Tab -->
        <div class="tab-bar">
            <button class="tab-btn active" data-category="all">全部</button>
            <button class="tab-btn" data-category="work">🏢 工作</button>
            <button class="tab-btn" data-category="life">🏠 生活</button>
            <button class="tab-btn" data-category="study">📚 学习</button>
        </div>
        
        <!-- 待办列表 -->
        <div id="todoList"></div>
    </div>

    <script>
        // 数据
        let todos = JSON.parse(localStorage.getItem('dolist_todos') || '[]');
        let currentFilter = 'all';
        let currentCategory = 'all';

        // DOM
        const addForm = document.getElementById('addForm');
        const todoInput = document.getElementById('todoInput');
        const categorySelect = document.getElementById('categorySelect');
        const prioritySelect = document.getElementById('prioritySelect');
        const dueDateInput = document.getElementById('dueDateInput');
        const todoList = document.getElementById('todoList');
        const totalCount = document.getElementById('totalCount');
        const completedCount = document.getElementById('completedCount');
        const ongoingCount = document.getElementById('ongoingCount');

        // 初始化
        render();

        // 添加待办
        addForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = todoInput.value.trim();
            if (!text) return;

            const todo = {
                id: Date.now(),
                text,
                category: categorySelect.value,
                priority: prioritySelect.value,
                dueDate: dueDateInput.value || null,
                completed: false,
                createdAt: new Date().toISOString()
            };

            todos.unshift(todo);
            save();
            render();

            todoInput.value = '';
            dueDateInput.value = '';
        });

        // 切换完成状态
        function toggleComplete(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                save();
                render();
            }
        }

        // 删除
        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            save();
            render();
        }

        // 筛选
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        // 分类 Tab
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                render();
            });
        });

        // 渲染
        function render() {
            // 过滤
            let filtered = todos.filter(t => {
                if (currentFilter === 'ongoing' && t.completed) return false;
                if (currentFilter === 'completed' && !t.completed) return false;
                if (currentCategory !== 'all' && t.category !== currentCategory) return false;
                return true;
            });

            // 统计
            totalCount.textContent = todos.length;
            completedCount.textContent = todos.filter(t => t.completed).length;
            ongoingCount.textContent = todos.filter(t => !t.completed).length;

            // 列表
            if (filtered.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📝</div>
                        <p>${todos.length === 0 ? '暂无待办，添加一个吧' : '没有符合条件的待办'}</p>
                    </div>
                `;
                return;
            }

            todoList.innerHTML = filtered.map(todo => {
                const isOverdue = todo.dueDate && !todo.completed && new Date(todo.dueDate) < new Date(new Date().toDateString());
                const categoryNames = { work: '工作', life: '生活', study: '学习' };
                const priorityLabels = { urgent: '⚡ 紧急', normal: '○ 普通' };

                let dueDateStr = '';
                if (todo.dueDate) {
                    const d = new Date(todo.dueDate);
                    const today = new Date();
                    const tomorrow = new Date(today);
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    
                    if (d.toDateString() === today.toDateString()) {
                        dueDateStr = '今天';
                    } else if (d.toDateString() === tomorrow.toDateString()) {
                        dueDateStr = '明天';
                    } else {
                        dueDateStr = `${d.getMonth()+1}/${d.getDate()}`;
                    }
                }

                return `
                    <div class="todo-item ${todo.completed ? 'completed' : ''}">
                        <div class="todo-checkbox" onclick="toggleComplete(${todo.id})">
                            ${todo.completed ? '✓' : ''}
                        </div>
                        <div class="todo-content">
                            <div class="todo-text">${escapeHtml(todo.text)}</div>
                            <div class="todo-meta">
                                <span class="tag tag-${todo.category}">${categoryNames[todo.category]}</span>
                                <span class="tag tag-${todo.priority}">${priorityLabels[todo.priority]}</span>
                                ${dueDateStr ? `<span class="due-date ${isOverdue ? 'overdue' : ''}">${isOverdue ? '⚠️ ' : ''}${dueDateStr}</span>` : ''}
                            </div>
                        </div>
                        <div class="todo-actions">
                            <button class="action-btn delete" onclick="deleteTodo(${todo.id})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 保存
        function save() {
            localStorage.setItem('dolist_todos', JSON.stringify(todos));
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
